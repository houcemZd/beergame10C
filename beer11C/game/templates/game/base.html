<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Beer Game{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── Design tokens ────────────────────────────────────────────── */
    :root {
      --bg:        #0d0f14;
      --surface:   #161920;
      --surface2:  #1e222d;
      --border:    #2a2f3d;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --accent:    #f5c842;     /* amber — "beer" */
      --accent2:   #3b82f6;    /* blue */
      --danger:    #ef4444;
      --success:   #22c55e;

      --retailer-color:     #f5c842;
      --wholesaler-color:   #3b82f6;
      --distributor-color:  #a855f7;
      --factory-color:      #22c55e;

      --radius: 10px;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
    }

    /* ── Reset ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Nav ─────────────────────────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: var(--accent);
    }
    .nav-logo span { color: var(--muted); }
    .nav-links { display: flex; gap: 1.2rem; }
    .nav-links a {
      color: var(--muted);
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); text-decoration: none; }

    /* ── Layout ──────────────────────────────────────────────────── */
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── Buttons ─────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.55rem 1.2rem;
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: #0d0f14;
    }
    .btn-primary:hover { background: #fdd835; transform: translateY(-1px); }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    .btn-danger:hover { background: var(--danger); color: white; }
    .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.8rem; }

    /* ── Cards ───────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    .card-title {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── Stat chips ──────────────────────────────────────────────── */
    .stat-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .stat {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      min-width: 90px;
    }
    .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-value { font-family: var(--font-mono); font-size: 1.3rem; font-weight: 700; margin-top: 2px; }
    .stat-value.good  { color: var(--success); }
    .stat-value.warn  { color: var(--accent); }
    .stat-value.bad   { color: var(--danger); }

    /* ── Role badge ──────────────────────────────────────────────── */
    .role-badge {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .role-retailer     { background: rgba(245,200,66,.15);  color: var(--retailer-color); }
    .role-wholesaler   { background: rgba(59,130,246,.15);  color: var(--wholesaler-color); }
    .role-distributor  { background: rgba(168,85,247,.15);  color: var(--distributor-color); }
    .role-factory      { background: rgba(34,197,94,.15);   color: var(--factory-color); }

    /* ── Input ───────────────────────────────────────────────────── */
    input[type=number], input[type=text], select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.5rem 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type=number]:focus, input[type=text]:focus, select:focus {
      border-color: var(--accent);
    }

    /* ── Pipeline viz ────────────────────────────────────────────── */
    .pipeline {
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
      padding: 1rem 0;
    }
    .pipeline-node {
      flex: 1;
      text-align: center;
      min-width: 120px;
    }
    .pipeline-node-box {
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
      margin: 0 0.5rem;
      position: relative;
    }
    .pipeline-node-box.retailer     { border-color: var(--retailer-color); }
    .pipeline-node-box.wholesaler   { border-color: var(--wholesaler-color); }
    .pipeline-node-box.distributor  { border-color: var(--distributor-color); }
    .pipeline-node-box.factory      { border-color: var(--factory-color); }
    .pipeline-arrow {
      color: var(--muted);
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .pipeline-label { font-size: 0.7rem; color: var(--muted); margin-top: 0.3rem; }

    /* ── Flash messages ──────────────────────────────────────────── */
    .messages { list-style: none; margin-bottom: 1rem; }
    .messages li {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
    }
    .messages .success { background: rgba(34,197,94,.1); border: 1px solid var(--success); }
    .messages .error   { background: rgba(239,68,68,.1);  border: 1px solid var(--danger); }

    /* ── Misc ────────────────────────────────────────────────────── */
    .text-mono { font-family: var(--font-mono); }
    .text-muted { color: var(--muted); }
    .text-accent { color: var(--accent); }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .mb-2 { margin-bottom: 1rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
    @media (max-width: 900px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .grid-4, .grid-2 { grid-template-columns: 1fr; }
    }

    /* ── Progress bar ────────────────────────────────────────────── */
    .progress-bar {
      height: 6px;
      background: var(--surface2);
      border-radius: 999px;
      overflow: hidden;
      margin: 0.5rem 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    /* ── Week badge ──────────────────────────────────────────────── */
    .week-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.3rem 0.9rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--muted);
    }
    .week-badge strong { color: var(--accent); }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="{% url 'home' %}" class="nav-logo">🍺 BEER<span>/</span>GAME</a>
    <div class="nav-links">
      <a href="{% url 'home' %}">Sessions</a>
      <a href="{% url 'new_game' %}">+ New Game</a>
    </div>
  </nav>

  <div class="container">
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
